plugins {
    id 'java'
    id 'application'
}

import org.gradle.api.tasks.bundling.Jar

repositories {
    mavenCentral()   // ⭐ REQUIRED so Gradle can download JavaFX
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'com.example.chatbot.MainApp'
}

dependencies {
    implementation 'org.openjfx:javafx-base:20.0.1:win'
    implementation 'org.openjfx:javafx-graphics:20.0.1:win'
    implementation 'org.openjfx:javafx-controls:20.0.1:win'
    implementation 'org.openjfx:javafx-fxml:20.0.1:win'

    // Export dependencies
    implementation 'org.apache.pdfbox:pdfbox:2.0.29'
    implementation 'org.apache.poi:poi-ooxml:5.2.5'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
}


// configure the run task with JavaFX module-path options
run {
    jvmArgs = [
        '--module-path', configurations.runtimeClasspath.asPath,
        '--add-modules', 'javafx.base,javafx.graphics,javafx.controls,javafx.fxml'
    ]
}


tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}


test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes(
                'Main-Class': 'com.example.chatbot.MainApp',
                'Implementation-Version': archiveVersion
        )
    }
    duplicatesStrategy = 'exclude'
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
}